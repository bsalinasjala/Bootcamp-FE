<h1>{{ title() }}</h1>

<h2>{{ selectedRecipe().name }}</h2>
<p>{{ selectedRecipe().description }}</p>

<h3>Servings: {{ servings() }}</h3>
<button (click)="decreaseServings()">-</button>
<button (click)="increaseServings()">+</button>

<h3>Ingredients</h3>

<ul>
    @for (ingredient of selectedRecipe().ingredients; track ingredient.name) {
    <li>
        {{ ingredient.quantity }} {{ ingredient.unit }} - {{ ingredient.name }}
    </li>
    }
</ul>

<button (click)="selectRecipe(recipes[0])">
    Spaghetti Carbonara
</button>

<button (click)="selectRecipe(recipes[1])">
    Caprese Salad
</button>
